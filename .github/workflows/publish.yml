name: Publish
on:
  push:
    branches: [master]
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

jobs:
  test_publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
      - run: npm install
      - run: npm test
      # - run: node ./publish.ts "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
      - name: Print GitHub event action
        run: echo "${{ github.event_name }}"

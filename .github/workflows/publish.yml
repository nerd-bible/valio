name: Publish
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm test
      - run: node ./publish.ts "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
      - run: NODE_AUTH_TOKEN="" npm publish --access public --provenance
